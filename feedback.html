<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Leave Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .star-rating {
      direction: rtl;
      display: inline-flex;
      font-size: 2rem;
      user-select: none;
    }
    .star-rating input[type="radio"] {
      display: none;
    }
    .star-rating label {
      color: #ccc;
      cursor: pointer;
      transition: color 0.2s;
    }
    .star-rating input[type="radio"]:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label {
      color: #ffc107;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <span class="navbar-brand">Feedback</span>
    <div>
      <a href="index.html" class="btn btn-light me-2">Home</a>
      <a href="events.html" class="btn btn-light me-2">Events</a>
      <a href="#" id="myBookingsLink" class="btn btn-light me-2">My Bookings</a>
      <a href="attendee_profile.php" class="btn btn-light me-2">My Profile</a>
      <a href="logout.php" class="btn btn-outline-light">Log Out</a>
    </div>
  </nav>

  <div class="container mt-5">
    <h2>Leave Feedback</h2>
    <form id="feedbackForm">
      <div class="mb-3">
        <label class="form-label">Select Event</label>
        <select class="form-select" name="event_id" id="eventDropdown" required>
          <option value="">-- Loading events... --</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label d-block">Rating</label>
        <div class="star-rating">
          <input type="radio" id="star5" name="rating" value="5" required />
          <label for="star5">&#9733;</label>
          <input type="radio" id="star4" name="rating" value="4" />
          <label for="star4">&#9733;</label>
          <input type="radio" id="star3" name="rating" value="3" />
          <label for="star3">&#9733;</label>
          <input type="radio" id="star2" name="rating" value="2" />
          <label for="star2">&#9733;</label>
          <input type="radio" id="star1" name="rating" value="1" />
          <label for="star1">&#9733;</label>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Comments</label>
        <textarea class="form-control" name="comment" rows="3" maxlength="500" placeholder="Optional"></textarea>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-success">Submit Feedback</button>
      </div>
    </form>
  </div>

  <script>
    async function updateBookingsLink() {
      const bookingsLink = document.getElementById('myBookingsLink');

      try {
        const response = await fetch('get_session.php');
        const session = await response.json();

        if (session.role === 'attendee' && session.attendee_id) {
          bookingsLink.href = `my_bookings.html?attendee_id=${encodeURIComponent(session.attendee_id)}`;
          return;
        }
      } catch (error) {
        console.error('Failed to build bookings link:', error);
      }

      bookingsLink.href = 'login.php';
    }

    async function loadEvents() {
      const select = document.getElementById('eventDropdown');
      select.innerHTML = '<option value="">-- Loading events... --</option>';
      try {
        const response = await fetch('feedback.php', { method: 'GET' });
        if (!response.ok) throw new Error('Failed to load events');
        const events = await response.json();

        if (!Array.isArray(events) || events.length === 0) {
          select.innerHTML = '<option value="">No upcoming events found</option>';
          return;
        }

        select.innerHTML = '<option value="">-- Select an event --</option>';
        events.forEach(event => {
          const option = document.createElement('option');
          option.value = event.id;
          option.textContent = event.title;
          select.appendChild(option);
        });

        // Optional: select event from URL param "event" if it matches title
        const params = new URLSearchParams(window.location.search);
        const eventName = params.get('event');
        if (eventName) {
          const match = Array.from(select.options).find(opt => opt.text.trim() === eventName.trim());
          if (match) match.selected = true;
        }
      } catch (err) {
        select.innerHTML = '<option value="">Failed to load events</option>';
        console.error(err);
      }
    }

    window.onload = () => {
      updateBookingsLink();
      loadEvents();

      document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);
        const data = {
          event_id: formData.get('event_id'),
          rating: formData.get('rating'),
          comment: formData.get('comment').trim(),
        };

        if (!data.event_id) {
          alert('Please select an event.');
          return;
        }
        if (!data.rating) {
          alert('Please provide a rating.');
          return;
        }

        try {
          const res = await fetch('feedback.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          const result = await res.json();

          if (res.ok && result.success) {
            alert('Feedback submitted successfully!');
            form.reset();
          } else {
            alert('Error: ' + (result.error || 'Unknown error'));
          }
        } catch (err) {
          alert('Failed to submit feedback: ' + err.message);
        }
      });
    };
  </script>
</body>
</html>
