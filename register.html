<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">
  <div class="card shadow p-4" style="width: 400px;">
    <h3 class="text-center mb-3">Sign Up</h3>

    <!-- Signup Form -->
    <form id="signupForm" action="register.php" method="POST" novalidate>
      <div class="mb-3">
        <label for="first_name" class="form-label">First Name</label>
        <input type="text" name="first_name" id="first_name" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="last_name" class="form-label">Last Name</label>
        <input type="text" name="last_name" id="last_name" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" name="email" id="email" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="phone_number1" class="form-label">Phone Number 1 *</label>
        <input type="text" name="phone_number1" id="phone_number1" class="form-control phone" pattern="^\d{11}$" />
      </div>

      <div class="mb-3">
        <label for="phone_number2" class="form-label">Phone Number 2</label>
        <input type="text" name="phone_number2" id="phone_number2" class="form-control phone" pattern="^\d{11}$" />
      </div>

      <div class="mb-3">
        <label for="phone_number3" class="form-label">Phone Number 3</label>
        <input type="text" name="phone_number3" id="phone_number3" class="form-control phone" pattern="^\d{11}$" />
      </div>

      <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <select name="role" id="role" class="form-select" required>
          <option value="" disabled selected>Select Role</option>
          <option value="attendee">Attendee</option>
          <option value="organizer">Organizer</option>
        </select>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-success">Sign Up</button>
      </div>
    </form>

    <div class="text-center mt-3">
      <small>Already have an account? <a href="login.html">Login</a></small>
    </div>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", function(event) {
      const phoneInputs = document.querySelectorAll(".phone");
      let filledPhones = 0;
      let invalid = false;

      phoneInputs.forEach(input => {
        if (input.value.trim() !== "") {
          filledPhones++;
          const isValid = /^\d{11}$/.test(input.value);
          if (!isValid) {
            input.classList.add("is-invalid");
            invalid = true;
          } else {
            input.classList.remove("is-invalid");
          }
        } else {
          input.classList.remove("is-invalid");
        }
      });

      if (filledPhones === 0) {
        alert("Please enter at least one phone number.");
        event.preventDefault();
        return;
      }

      if (invalid) {
        alert("Phone numbers must be exactly 11 digits.");
        event.preventDefault();
      }
    });
  </script>
</body>
</html>
