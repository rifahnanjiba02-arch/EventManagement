<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Available Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .event-card {
      border-radius: 15px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    .event-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }
    .event-type {
      font-size: 0.9rem;
      font-weight: 600;
      color: #007bff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .event-date-location {
      font-size: 0.95rem;
      color: #555;
    }
    .btn-book {
      background: linear-gradient(45deg, #007bff, #6610f2);
      border: none;
      font-weight: 600;
      transition: background 0.3s ease;
    }
    .btn-book:hover {
      background: linear-gradient(45deg, #6610f2, #007bff);
      color: #fff;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-4">
    <a href="index.html" class="navbar-brand text-decoration-none">Event Booking</a>
    <div id="navActions">
      <a href="login.php" class="btn btn-light me-2">Login</a>
      <a href="register.php" class="btn btn-outline-light">Sign Up</a>
    </div>
  </nav>

  <div class="container mt-5">
    <h2 class="mb-4">Upcoming Events</h2>
    <div id="upcomingEventsContainer" class="row g-4"></div>

    <h2 class="mt-5 mb-4">Previous Events</h2>
    <div id="previousEventsContainer" class="row g-4"></div>
  </div>

  <script>
    let userRole = null;
    let attendeeId = null;

    fetch('get_session.php')
      .then(response => response.json())
      .then(session => {
        userRole = session.role;
        attendeeId = session.attendee_id;
        updateNav(session);
        loadEvents();
      })
      .catch(error => {
        console.error('Failed to fetch session info:', error);
        alert('Session error. Please log in again.');
      });

    function updateNav(session) {
      const navActions = document.getElementById('navActions');

      if (session.role === 'attendee') {
        navActions.innerHTML = `
          <a href="attendee_profile.php" class="btn btn-light me-2">My Profile</a>
          <a href="my_bookings.html?attendee_id=${encodeURIComponent(session.attendee_id || '')}" class="btn btn-light me-2">My Bookings</a>
          <a href="logout.php" class="btn btn-outline-light">Log Out</a>
        `;
        return;
      }

      if (session.role === 'organizer') {
        navActions.innerHTML = `
          <a href="organizer_profile.php" class="btn btn-light me-2">Dashboard</a>
          <a href="logout.php" class="btn btn-outline-light">Log Out</a>
        `;
      }
    }

    async function loadEvents() {
      try {
        const res = await fetch('get_events.php');
        if (!res.ok) throw new Error('Failed to fetch events');
        const data = await res.json();

        const upcomingContainer = document.getElementById('upcomingEventsContainer');
        const previousContainer = document.getElementById('previousEventsContainer');

        upcomingContainer.innerHTML = '';
        previousContainer.innerHTML = '';

        function createEventCard(event) {
          const canBook = userRole === 'attendee' && attendeeId;

          const col = document.createElement('div');
          col.className = 'col-md-6 col-lg-4';

          const card = document.createElement('div');
          card.className = 'event-card p-4 bg-white';

          card.innerHTML = `
            <h5 class="mb-2">${event.title}</h5>
            <div class="event-type mb-2">${event.type}</div>
            <div class="event-date-location mb-3">
              <div><strong>Date:</strong> ${event.event_date}</div>
              <div><strong>Location:</strong> ${event.location}</div>
            </div>
            ${canBook ? `<button class="btn btn-book w-100">Book This Event</button>` : ''}
          `;

          if (canBook) {
            card.querySelector('button').addEventListener('click', () => bookEvent(event.id));
          }

          col.appendChild(card);
          return col;
        }

        data.upcomingEvents.forEach(event => {
          upcomingContainer.appendChild(createEventCard(event));
        });

        data.previousEvents.forEach(event => {
          previousContainer.appendChild(createEventCard(event));
        });
      } catch (error) {
        console.error('Error loading events:', error);
      }
    }

    async function bookEvent(eventId) {
      if (!attendeeId || userRole !== 'attendee') {
        alert('You must be an attendee to book events.');
        return;
      }

      try {
        const response = await fetch('book_event.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ event_id: eventId, attendee_id: attendeeId })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          alert('Booking successful!');
          window.location.href = `my_bookings.html?attendee_id=${attendeeId}`;
        } else {
          alert('Booking failed: ' + (result.error || 'Unknown error'));
        }
      } catch (error) {
        alert('Error during booking: ' + error.message);
      }
    }
  </script>
</body>
</html>
