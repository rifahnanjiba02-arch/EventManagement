<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Event</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <span class="navbar-brand">Create Event</span>
    <div>
      <a href="organizer_profile.php" class="btn btn-light me-2">Back to Profile</a>
      <a href="logout.php" class="btn btn-outline-light">Log Out</a>
    </div>
  </nav>

  <div class="container mt-5">
    <div id="accessMessage" class="alert alert-warning d-none" role="alert"></div>
    <h2>Create New Event</h2>
    <form id="create-event-form" action="create_event.php" method="POST">
      <div class="mb-3">
        <label for="title">Title</label>
        <input type="text" name="title" id="title" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="type">Type</label>
        <input type="text" name="type" id="type" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="date">Date</label>
        <input type="date" name="date" id="date" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="location">Location</label>
        <input type="text" name="location" id="location" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="collaborators">Collaborators (optional)</label>
        <select name="collaborators[]" id="collaborators" class="form-select" multiple>
          <!-- Filled dynamically -->
        </select>
        <div class="form-text">Hold Ctrl (or Cmd) to select multiple organizers</div>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Create Event</button>
      </div>
    </form>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('create-event-form');
      const message = document.getElementById('accessMessage');
      const select = document.getElementById('collaborators');

      fetch('get_session.php')
        .then(res => res.json())
        .then(session => {
          if (session.role !== 'organizer') {
            form.classList.add('d-none');
            message.classList.remove('d-none');
            message.textContent = 'Only organizers can create events.';
            setTimeout(() => {
              window.location.href = session.role ? 'events.html' : 'login.php';
            }, 1800);
            throw new Error('UNAUTHORIZED_CREATE_EVENT_PAGE');
          }

          return fetch('create_event.php?fetch_organizers=1');
        })
        .then(res => res.json())
        .then(data => {
          if (!Array.isArray(data)) {
            select.innerHTML = '<option disabled>Error loading collaborators</option>';
            return;
          }

          data.forEach(org => {
            const option = document.createElement('option');
            option.value = org.organizer_id;
            option.textContent = `${org.first_name} ${org.last_name} (${org.email})`;
            select.appendChild(option);
          });
        })
        .catch(err => {
          if (err.message === 'UNAUTHORIZED_CREATE_EVENT_PAGE') {
            return;
          }

          console.error(err);
          select.innerHTML = '<option disabled>Failed to load collaborators</option>';
        });
    });
  </script>
</body>
</html>
