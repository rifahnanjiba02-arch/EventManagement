<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Event</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <span class="navbar-brand">Create Event</span>
    <div>
      <a href="organizer_profile.php" class="btn btn-light me-2">Back to Profile</a>
      <a href="logout.php" class="btn btn-outline-light">Log Out</a>
    </div>
  </nav>

  <div class="container mt-5">
    <h2>Create New Event</h2>
    <form id="create-event-form" action="create_event.php" method="POST">
      <div class="mb-3">
        <label for="title">Title</label>
        <input type="text" name="title" id="title" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="type">Type</label>
        <input type="text" name="type" id="type" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="date">Date</label>
        <input type="date" name="date" id="date" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="location">Location</label>
        <input type="text" name="location" id="location" class="form-control" required />
      </div>

      <div class="mb-3">
        <label for="collaborators">Collaborators (optional)</label>
        <select name="collaborators[]" id="collaborators" class="form-select" multiple>
          <!-- Filled dynamically -->
        </select>
        <div class="form-text">Hold Ctrl (or Cmd) to select multiple organizers</div>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Create Event</button>
      </div>
    </form>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('create_event.php?fetch_organizers=1')
        .then(res => res.json())
        .then(data => {
          const select = document.getElementById('collaborators');
          if (!Array.isArray(data)) {
            select.innerHTML = '<option disabled>Error loading collaborators</option>';
            return;
          }

          data.forEach(org => {
            const option = document.createElement('option');
            option.value = org.organizer_id;
            option.textContent = `${org.first_name} ${org.last_name} (${org.email})`;
            select.appendChild(option);
          });
        })
        .catch(err => {
          console.error(err);
          const select = document.getElementById('collaborators');
          select.innerHTML = '<option disabled>Failed to load collaborators</option>';
        });
    });
  </script>
</body>
</html>
